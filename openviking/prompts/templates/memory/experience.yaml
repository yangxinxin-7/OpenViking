memory_type: experience
description: |
  A generalizable, reusable insight distilled from agent execution — not a process record.
  Captures a transferable pattern: what situation triggers it, what approach works, and why.

directory: "viking://agent/{{ agent_space }}/memories/experiences"
filename_template: "{{ experience_name }}.md"
enabled: true
operation_mode: "upsert"
agent_only: true

fields:
  - name: experience_name
    type: string
    description: |
      Lowercase snake_case, ASCII only, max 5 words. Name the generalizable pattern, not the specific instance.
      Do not use Chinese.
      Good: "booking_duplicate_handling", "pytest_asyncio_cancel_hang_fix".
    merge_op: immutable

  - name: content
    type: string
    description: |
      Structured experience in EXACTLY this 3-section format:

      ## Situation
      <markdown bullets: trigger conditions and context where this pattern applies>

      ## Approach
      <markdown bullets: the effective strategy or key steps to take>

      ## Reflect
      <markdown bullets: distilled principles — why the approach works, what risks or failure modes exist, and actionable rules to follow in future>

      Rules:
      - Use exactly these 3 headings in this order.
      - Each section uses concise markdown bullets (no numbered lists, no nested headings).
      - Reflect must contain only transferable principles and lessons. Write as forward-looking rules that guide future behavior, not as a retrospective summary of what happened in past cases.
    merge_op: patch

