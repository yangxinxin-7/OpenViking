memory_type: trajectory
description: |
  Agent execution trajectory memory.
  Capture one concrete execution flow the agent went through to fulfill a specific task.
  A trajectory is a scenario-specific summary of what happened in this conversation.

  # When to extract
  - There is an identifiable task that the agent worked on end-to-end.
  - The conversation contains concrete actions / tool calls / decisions that show how the task was carried out.
  - If the conversation is pure chitchat with no execution, output NO trajectory.

  # Guidelines
  - One conversation may yield 0, 1 or a few trajectories. Each trajectory covers ONE distinct task.
  - If two candidates describe the same task, keep only one.

directory: "viking://agent/{{ agent_space }}/memories/trajectories"
filename_template: "{{ trajectory_name }}.md"
enabled: true
operation_mode: "add_only"

fields:
  - name: trajectory_name
    type: string
    description: |
      Lowercase snake_case only, ASCII letters only, max 5 words.
      Use a direct, stable name for the task.
      Do not use Chinese.
      Do not create near-duplicate names for the same task.
      Good: "flight_booking_duplicate_resolution", "pytest_asyncio_cancel_hang_fix".
    merge_op: immutable

  - name: outcome
    type: string
    description: |
      Final result of the trajectory. Use exactly one of:
      success, failure, partial, unfinished, unknown.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Markdown summary in EXACTLY this format:
      - Trigger: <one sentence>
      - Handling: <one concise sentence covering key actions, tool calls, and decisions>
      - Result: <one sentence>

      Rules:
      - Use exactly these 3 bullets in English.
      - Do not use headings.
      - Do not use numbered lists.
      - Do not use extra bullets.
      - Do not use free-form paragraphs.
      - Keep it concise.
    merge_op: patch
